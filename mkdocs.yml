site_name: AI Landscape
site_description: Documentation for AI architectures, tools, and foundations.
site_url: https://jaojbls.github.io/ai-landscape/

nav:
  - 🧱 Overview: index.md
  - 🥞 AI Stack Layers:
      - L1 Model Architectures: 01-model-architectures.md
      - L2 Training & Adaptation: 02-training-adaptation.md
      - L3 Hardware: 03-hardware.md
      - L4 Model Formats: 04-model-formats.md
      - L5 Inference Engines: 05-inference-engines.md
      - L6 Tools: 06-tools.md
      - L7 LLM Extensions: 07-llm-extensions.md
  - 🌱 Living Stack Tiers:
      - T1 Foundation: L1-foundation.md
      - T2 Alignment: L2-alignment.md
      - T3 Adaptability: L3-adaptability.md

theme:
  name: material
  palette:
    - scheme: default
      primary: black
      accent: grey
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: grey
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  features:
    - navigation.sections
    - navigation.instant
    - search.suggest
    - search.highlight
    - toc.integrate

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - pymdownx.details

plugins:
  - search
